name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install maturin
        run: pip install maturin pyinstaller

      - name: Cache Rust build
        id: cache-rust
        uses: actions/cache@v4
        with:
          path: core_rs/target   # fix: cache build output, không phải source
          key: rust-${{ hashFiles('core_rs/src/**', 'core_rs/Cargo.toml', 'core_rs/Cargo.lock') }}

      - name: Build Rust core_rs
        if: steps.cache-rust.outputs.cache-hit != 'true'
        working-directory: core_rs
        run: maturin build --release --target x86_64-pc-windows-msvc --out dist_rs

      - name: Copy .pyd into core/
        working-directory: core_rs
        run: |
          # fix: khi cache hit, lấy .pyd trực tiếp từ target/ thay vì dist_rs/
          if (Test-Path dist_rs) {
            $whl = Get-ChildItem dist_rs -Filter "*.whl" | Select-Object -First 1
            Expand-Archive $whl.FullName -DestinationPath dist_rs\extracted -Force
            $pyd = Get-ChildItem dist_rs\extracted -Recurse -Filter "*.pyd" | Select-Object -First 1
          } else {
            $pyd = Get-ChildItem target\x86_64-pc-windows-msvc\release -Filter "*.pyd" | Select-Object -First 1
          }
          if (-not $pyd) { Write-Error "No .pyd found"; exit 1 }
          Copy-Item $pyd.FullName -Destination ..\core\core_rs.pyd

      - name: Build EXEs (release + debug)
        run: |
          $common = @(
            "--onefile", "--console",
            "--add-binary", "core\core_rs.pyd;core",
            "--add-data",   "core\gui_console.py;core",
            "--add-data",   "core\__init__.py;core",
            "main.py"
          )
          pyinstaller --name main      @common
          pyinstaller --name mainDEBUG @common

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/main.exe
            dist/mainDEBUG.exe

      - name: Clean workflow artifacts
        if: always()
        run: |
          Remove-Item -Recurse -Force dist_rs  -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force dist     -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force build    -ErrorAction SilentlyContinue
          Remove-Item -Force *.spec            -ErrorAction SilentlyContinue
