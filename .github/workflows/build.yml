name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install maturin
        run: pip install maturin pyinstaller

      - name: Cache Rust build
        id: cache-rust
        uses: actions/cache@v4
        with:
          path: core_rs/target
          key: rust-${{ hashFiles('core_rs/src/**', 'core_rs/Cargo.toml', 'core_rs/Cargo.lock') }}

      - name: Build Rust core_rs
        if: steps.cache-rust.outputs.cache-hit != 'true'
        working-directory: core_rs
        run: maturin build --release --target x86_64-pc-windows-msvc

      - name: Copy .pyd into core/
        working-directory: core_rs
        run: |
          $pyd = Get-ChildItem target -Recurse -Filter "*.pyd" `
            | Where-Object { $_.FullName -like "*release*" } `
            | Select-Object -First 1
          if (-not $pyd) { Write-Error "No .pyd found in target/"; exit 1 }
          Write-Host "Found: $($pyd.FullName)"
          Copy-Item $pyd.FullName -Destination ..\core\core_rs.pyd

      - name: Build EXEs (release + debug)
        run: |
          $common = @(
            "--onefile", "--console",
            "--add-binary", "core\core_rs.pyd;core",
            "--add-data",   "core\gui_console.py;core",
            "--add-data",   "core\__init__.py;core",
            "main.py"
          )
          pyinstaller --name main      @common
          pyinstaller --name mainDEBUG @common

      - name: Pack release zip
        run: |
          Compress-Archive -Path dist\main.exe, dist\mainDEBUG.exe `
            -DestinationPath dist\app.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/main.exe
            dist/mainDEBUG.exe
            dist/app.zip

      - name: Clean workflow artifacts
        if: always()
        run: |
          Remove-Item -Recurse -Force dist  -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Force *.spec         -ErrorAction SilentlyContinue
