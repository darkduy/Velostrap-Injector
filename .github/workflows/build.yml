name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE (release)
        run: pyinstaller --onefile --console --name main main.py

      - name: Build EXE (debug)
        run: pyinstaller --onefile --console --name mainDEBUG --add-data "core;core" main.py

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: main
          path: dist/main.exe

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: mainDEBUG
          path: dist/mainDEBUG.exe