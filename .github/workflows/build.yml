name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install maturin
        run: pip install maturin pyinstaller

      - name: Cache Rust build
        id: cache-rust
        uses: actions/cache@v4
        with:
          path: core_rs
          key: rust-${{ hashFiles('core_rs/**') }}

      - name: Build Rust core_rs
        if: steps.cache-rust.outputs.cache-hit != 'true'
        working-directory: core_rs
        run: maturin build --release --target x86_64-pc-windows-msvc --out ../dist_rs

      - name: Copy .pyd into core/
        run: |
          $pyd = Get-ChildItem dist_rs -Filter "*.pyd" | Select-Object -First 1
          Copy-Item $pyd.FullName -Destination core\core_rs.pyd

      - name: Build EXEs (release + debug)
        run: |
          pyinstaller --onefile --console --name main `
            --add-binary "core\core_rs.pyd;core" main.py
          pyinstaller --onefile --console --name mainDEBUG `
            --add-binary "core\core_rs.pyd;core" main.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            dist/main.exe
            dist/mainDEBUG.exe

      - name: Clean workflow artifacts
        if: always()
        run: |
          Remove-Item -Recurse -Force dist_rs -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
          Remove-Item -Recurse -Force build -ErrorAction SilentlyContinue
          Remove-Item -Force *.spec -ErrorAction SilentlyContinue